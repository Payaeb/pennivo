name: Release

# Pushing a v* tag triggers a Windows installer build that publishes the
# installer + latest.yml (auto-update feed metadata) to a draft GitHub Release.
# electron-builder reads the GitHub provider config from
# packages/desktop/package.json -> build.publish, so no manual upload step is
# needed. The release lands as a draft (electron-builder's GitHub default), so
# release notes can be written before publishing.
#
# Linux / macOS builds and code signing are intentionally out of scope for
# v1.0.0 (see project_phase7_plan).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # .npmrc pins node-linker=hoisted so electron-builder can trace
      # transitive deps (e.g. electron-updater -> debug -> ms) into the asar.
      # Do NOT add a step that overrides .npmrc here.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: pnpm --filter @pennivo/desktop build

      # electron-builder reads build.publish from packages/desktop/package.json
      # (GitHub provider, owner=Payaeb, repo=pennivo) and uploads the installer
      # + latest.yml to the matching draft Release. GH_TOKEN (not GITHUB_TOKEN)
      # is the env var electron-builder looks for.
      - name: Build installer and publish to GitHub Releases
        run: pnpm --filter @pennivo/desktop exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
