name: Release

# Pushing a v* tag triggers a Windows installer build that publishes the
# installer + latest.yml (auto-update feed metadata) to a draft GitHub Release.
# electron-builder reads the GitHub provider config from
# packages/desktop/package.json -> build.publish, so no manual upload step is
# needed. The release lands as a draft (electron-builder's GitHub default), so
# release notes can be written before publishing.
#
# Linux / macOS builds and code signing are intentionally out of scope for
# v1.0.0 (see project_phase7_plan).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Artifact version (e.g. 0.9.0-test). Required for manual runs. Overrides package.json version via electron-builder extraMetadata.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # .npmrc pins node-linker=hoisted so electron-builder can trace
      # transitive deps (e.g. electron-updater -> debug -> ms) into the asar.
      # Do NOT add a step that overrides .npmrc here.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: pnpm --filter @pennivo/desktop build

      # Compute the artifact version. For tag pushes, strip the leading 'v'
      # from the tag name (refs/tags/v1.0.0 -> 1.0.0). For manual dispatch,
      # use the required `version` input. The result is passed to
      # electron-builder via --config.extraMetadata.version, so the artifact
      # name + GitHub release tag follow the actual tag/input rather than
      # whatever package.json happens to say. This makes the v0.9.0-test
      # validation safe even though package.json is pinned at 1.0.0.
      - name: Compute artifact version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building artifact for version: $VERSION"

      # electron-builder reads build.publish from packages/desktop/package.json
      # (GitHub provider, owner=Payaeb, repo=pennivo) and uploads the installer
      # + latest.yml to the matching draft Release. GH_TOKEN (not GITHUB_TOKEN)
      # is the env var electron-builder looks for.
      - name: Build installer and publish to GitHub Releases
        shell: bash
        run: pnpm --filter @pennivo/desktop exec electron-builder --win --publish always --config.extraMetadata.version=${{ steps.version.outputs.version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
